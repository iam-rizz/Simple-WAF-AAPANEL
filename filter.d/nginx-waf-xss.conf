# =============================================================================
# FAIL2BAN FILTER: nginx-waf-xss
# =============================================================================
# Detects Cross-Site Scripting (XSS) attempts in Nginx access logs.
#
# Install: copy to /etc/fail2ban/filter.d/nginx-waf-xss.conf
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]

# XSS patterns - detects common XSS payloads in URL
# Matches: <script>, javascript:, onerror=, onload=, alert(), document.cookie, etc.
failregex = ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*(?:<script|</script|javascript:|onerror\s*=|onload\s*=|onmouseover\s*=|onclick\s*=|alert\s*\(|document\.cookie|document\.write|eval\s*\(|String\.fromCharCode|innerHTML|document\.location|window\.location|prompt\s*\(|confirm\s*\(|<img[^>]+src\s*=|<iframe|<svg|<body[^>]+onload|<embed|<object|<style|expression\s*\(|url\s*\(\s*javascript|data\s*:\s*text/html|-moz-binding).*$"

    # XSS encoding evasion: hex, decimal, unicode entities
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*(?:%3Cscript|%3C%2Fscript|%3Cimg|%3Csvg|%3Ciframe|%3Cbody|%3Cembed|%3Cobject|%3Cstyle|&#x3C;script|&#60;script|&#x3C;script|\\x3Cscript|\\u003Cscript|%22%3E%3Cscript|javascript%3A|onerror%3D|onload%3D|javascript&#58;|onerror&#61;|onload&#61;).*$"

    # XSS in parameters - common parameter names + payload patterns
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*(?:[?&](?:q|s|search|query|name|title|comment|message|text|content|desc|description|keyword|keywords|input|value|data|html|body|page|url|redirect|return|next|goto|redir|dest|destination|continue|image|img|file|filename|path|document|page_id|p|id|item|cat|category|type|action|cmd|command|exec|func|function|do|op|option|task|step|mode|method|show|display|render|template|theme|skin|style|css|class|widget|module|plugin|block|section|part|panel|content|text|title|head|header|footer|body|sidebar|main|nav|menu|breadcrumb|caption|label|tag|tags|author|user|username|login|email|mail|phone|address|city|state|zip|country|company|org|organization|subject|subject_id|message|msg|note|comment|review|rating|feedback|feedback_score|score|vote|points|reward|prize|gift|coupon|discount|promo|code|token|key|secret|password|pass|pwd|passwd|old_password|new_password|confirm|confirmation|verify|verification|captcha|challenge|response|answer|solution|result|output|return|callback|cb|jsonp|format|output_format|type|content_type|encoding|charset|lang|language|locale|timezone|tz|currency|date|time|timestamp|start|end|from|to|begin|finish|min|max|limit|offset|page|per_page|pagesize|order|sort|dir|direction|group|field|fields|column|columns|select|distinct|unique|filter|where|condition|match|like|regex|pattern|expression|query|sql|database|table|record|row|entry|item|element|node|child|parent|root|tree|list|array|map|object|json|xml|yaml|csv|tsv|txt|text|raw|html|escaped|encoded|decoded|compressed|encrypted|hashed|signed|verified|trusted|safe|unsafe|dangerous|malicious|infected|clean|dirty|valid|invalid|error|warning|info|debug|trace|log|audit|monitor|track|trace|metric|stat|stats|statistics|report|summary|overview|detail|config|configuration|setting|preference|option|choice|select|pick|choose|vote|rate|rank|score|grade|level|tier|stage|phase|step|part|section|chapter|page|screen|view|tab|panel|dialog|modal|popup|window|frame|iframe|