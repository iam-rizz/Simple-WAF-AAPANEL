# =============================================================================
# FAIL2BAN FILTER: nginx-waf
# =============================================================================
# Web Application Firewall filter for Nginx access logs.
# Detects scans for sensitive paths, config files, shells, backups, etc.
#
# This filter matches malicious URL path patterns in Nginx access logs.
# The <HOST> placeholder captures the client IP address.
#
# Install: copy to /etc/fail2ban/filter.d/nginx-waf.conf
# =============================================================================

[INCLUDES]
before = common.conf

[Definition]

# -----------------------------------------------------------------------------
# MAIN FAILREGEX - SENSITIVE PATH SCAN DETECTION
# -----------------------------------------------------------------------------
# Matches Nginx combined log format:
# $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"
#
# <HOST> captures the IP. We match the HTTP method + path.
# -----------------------------------------------------------------------------

failregex = ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH|TRACE|CONNECT)\s+(?:/[^\s]*)?\s+HTTP[^"]*".*(?:40[0-9]|49[0-9]|50[0-9]).*$

    # === DOTFILES / HIDDEN FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.env(?:\.|/|\s).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.env\b.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.git(?:/|config|/config|/HEAD|/index|/logs).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.git(?:ignore|attributes|modules|credentials).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.svn(/|entries|/wc\.db).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.htaccess.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.htpasswd.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.ssh/(?:id_rsa|id_dsa|id_ecdsa|id_ed25519|authorized_keys|known_hosts|config).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.DS_Store.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.bash_history.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.aws/(?:credentials|config).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.docker/(?:config\.json|daemon\.json).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.npmrc.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.netrc.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.pypirc.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.(?:svn|hg|bzr)(/|entries|wc\.db).*$"

    # === WORDPRESS ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-config(?:\.php)?(?:\.bak|\.old|\.orig|\.save|\.txt|~)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-login\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-admin/.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?xmlrpc\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-json/.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-content/(?:backup|backups|debug\.log|uploads/).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-cron\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?wp-includes/.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?readme\.html.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?license\.txt.*$"

    # === PHP INFO / DEBUG ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:phpinfo|info|test|debug|status|health|check|verify)\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:p|php|x|sh|cmd|exec|up)\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:server-status|server-info|stub_status|nginx_status).*$"

    # === SYSTEM FILE PATH TRAVERSAL ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:etc/passwd|etc/shadow|etc/group|etc/hosts|etc/hostname|etc/resolv\.conf|etc/fstab|etc/crontab|etc/ssh/sshd_config|etc/nginx/nginx\.conf|etc/apache2|etc/httpd|etc/mysql|etc/php).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?proc/self/(?:environ|cmdline|status|fd).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?var/log/(?:auth\.log|access\.log|error\.log|messages|syslog|secure|mail\.log).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:\.\./|%.2e%.2e/|%2e%2e/|\.\.%2f|\.\.%5c).*$"

    # === ADMIN PANELS ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:phpmyadmin|phpMyAdmin|pma|myadmin|mysqladmin|dbadmin|adminer)(?:/|\.php)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:/admin(?:/|\.php|\.html|panel|area|control|login|cp|istrator)|/administrator|/adminpanel|/admin_area|/admincp|/manager/html|/cpanel|/whm|/pleskstat|/siteadmin|/dashboard)(?:/|\.php|\.html)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:/backend/login|/secretadmin|/controlpanel|/adminpanel).*$"

    # === BACKUP FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:backup|backups|dump|db|database|www|html|site|web)[-_]?(?:backup|dump|sql|file)?\.(?:zip|tar|tar\.gz|tgz|sql|gz|rar|7z|bz2).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?.*\.(?:bak|old|orig|save|backup|swp|swo|tmp)(?:$|\?|\s).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?.*\.sql(?:\.gz|\.bz2)?(?:$|\?|\s).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:backup|backups|dump|data)(?:/|\.zip|\.tar|\.tar\.gz|\.sql)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?.*(?:~|\.\d+)(?:$|\?|\s).*$"

    # === CONFIG FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:config|configuration|settings|localconfig|db|database|app|parameters|appsettings|connection|connect|conn|dbconn|dbconfig|bootstrap|constants|init|common)\.(?:php|inc|json|yml|yaml|xml|ini|cfg|properties|groovy).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:web\.config|configuration\.inc\.php|configure\.php).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:includes?|inc|lib|library|classes|conf|cfg)/config\.php.*$"

    # === SHELL / WEBSHELL FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:c99|r57|shell|cmd|wso|b374k|indoxploit|webadmin|sh|x|up|upload|uploader|c100|DxShell|locus7s|emp3ror|fx29|phpspy|PhpSpy|WSO|wpx|sh3ll|simattacker|mic22|0byt3m1n1|1n73ction|xshell|zshell)\.php.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:upload|uploader|uploadify|uploadpic|uploadImage|uploadFile)\.php.*$"

    # === CI/CD FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.gitlab-ci\.ya?ml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?Jenkinsfile.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.github/workflows/.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.circleci/config\.yml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.travis\.yml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?azure-pipelines\.ya?ml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?bitbucket-pipelines\.yml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.drone\.ya?ml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:buddy|appveyor)\.ya?ml.*$"

    # === DOCKER FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?docker-compose(?:\.\w+)?\.ya?ml.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?Dockerfile(?:\.\w+)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?\.dockerignore.*$"

    # === PACKAGE / DEPENDENCY FILES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?composer\.(?:json|lock|phar).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?package(?:-lock)?\.json.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?yarn\.lock.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:Gemfile|requirements\.txt|Pipfile|pom\.xml|build\.gradle|Cargo\.toml|go\.mod)(?:\.lock)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?vendor/.*$"

    # === FRAMEWORK SPECIFIC ===
    # Symfony
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:console/|_profiler/|_fragment|_wdt/|app_dev\.php).*$"
    # Laravel
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?storage/(?:logs|framework).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?_ignition/.*$"
    # Spring Boot Actuator
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?actuator(?:/|/env|/health|/info|/beans|/configprops|/mappings|/metrics|/threaddump|/heapdump|/httptrace|/loggers|/auditevents|/scheduledtasks|/sessions|/shutdown|/refresh)?.*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?jolokia/.*$"
    # Django
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?__debug__/.*$"
    # ASP.NET
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:elmah\.axd|trace\.axd|TraceHandler\.axd|WebResource\.axd|ScriptResource\.axd|clientaccesspolicy\.xml|crossdomain\.xml).*$"
    # Tomcat
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:manager/html|manager/text|manager/jmxproxy|manager/status|host-manager/html|WEB-INF/web\.xml|WEB-INF/|META-INF/).*$"
    # Magento
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?app/etc/local\.xml.*$"
    # Drupal
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:sites/default/settings\.php|update\.php|cron\.php|install\.php).*$"
    # Elasticsearch / Kibana
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:_cat/|_nodes|_cluster/|_search|_all|_aliases|_settings|_mapping|kibana/).*$"

    # === CLOUD / SECRETS ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:\.aws/credentials|\.aws/config|\.google/credentials|\.azure/credentials|\.kube/(?:config|token)|\.terraform/|terraform\.tfstate|secrets\.(?:yml|yaml|json|properties|py|txt)|credentials\.(?:json|yml|yaml|properties|txt)|service-account.*\.json|key\.(?:json|pem|key)|private.*\.pem|private.*\.key|cert\.(?:pem|key)|fullchain\.pem).*$"

    # === API / SWAGGER / GRAPHQL ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:swagger\.json|swagger-ui/|swagger-resources|api-docs|v[23]/api-docs|openapi\.(?:json|yaml|yml)).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:graphql|graphiql|graphql\.php|graphiql\.php).*$"

    # === CVE / EXPLOIT SPECIFIC ===
    # Log4Shell - JNDI in request
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*jndi:(?:ldap|rmi|dns|iiop).*$"
    # Spring4Shell
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*class\.module\.classLoader.*$"
    # ProxyShell / ProxyLogon (Exchange)
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:autodiscover/autodiscover\.json|ecp/|owa/|ecp/proxy).*$"
    # Confluence RCE
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*\$\{.*Runtime.*\}.*$"
    # ThinkPHP RCE
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*index\.php\?s=index/think.*$"
    # WebLogic
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:_async/AsyncResponseService|uddiexplorer/|wls-wsat/).*$"
    # Shiro remember-me
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+.*remember-me=deleteMe.*$"

    # === PHP UNIT RCE ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?vendor/phpunit/phpunit/src/Util/PHP/eval-stdin\.php.*$"

    # === MISCELLANEOUS PROBES ===
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:flag|getshell|shell|cmd|exec).*$"
    ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)\s+(?:/[^\s]*)?(?:\.git|\.svn|\.hg|\.bzr)(?:/|$|\s).*$"

# -----------------------------------------------------------------------------
# IGNOREREGEX - Patterns to ignore (legitimate requests)
# -----------------------------------------------------------------------------
ignoreregex =

# =============================================================================
# DATE PATTERN (for matching timestamps in Nginx logs)
# =============================================================================
# Nginx default: 23/Jun/2026:10:00:00 +0000
# =============================================================================
datepattern = %%d/%%b/%%Y:%%H:%%M:%%S %%z
