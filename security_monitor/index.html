
<style>

*{box-sizing:border-box;margin:0;padding:0}
.waf{height:780px;max-height:780px;background:var(--w-bg);border:1px solid var(--w-bdr);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:var(--w-tx)}
.waf-header{height:58px;flex:0 0 58px;background:var(--w-sur);border-bottom:1px solid var(--w-bdr);display:flex;align-items:center;justify-content:space-between;padding:0 14px;gap:10px}
.waf-brand{display:flex;align-items:center;gap:9px;flex-shrink:0}
.waf-logo{width:34px;height:34px;border-radius:8px;background:var(--w-acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.waf-title{font-size:14px;font-weight:700;color:var(--w-tx);letter-spacing:-.2px}
.waf-subtitle{font-size:11px;color:var(--w-tx3);margin-top:1px}
.waf-btns{display:flex;align-items:center;gap:5px;flex-shrink:0}
.wb{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px solid var(--w-bdr);background:var(--w-sur2);color:var(--w-tx2);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1}
.wb:hover{background:var(--w-nav-h);border-color:var(--w-bdr2);color:var(--w-tx)}
.wb.pri{background:var(--w-acc);border-color:var(--w-acc);color:#fff}
.wb.pri:hover{opacity:.85}
.wbicon{width:14px;height:14px;display:inline-block;vertical-align:middle;flex-shrink:0}
.waf-body{flex:1;min-height:0;display:flex}
.waf-sidebar{width:170px;flex:0 0 170px;background:var(--w-sur);border-right:1px solid var(--w-bdr);display:flex;flex-direction:column;padding:6px 0;gap:1px;overflow-y:auto}
.wsec{padding:7px 13px 3px;font-size:10px;font-weight:700;color:var(--w-tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.wnav{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;cursor:pointer;border-left:2.5px solid transparent;color:var(--w-tx2);font-size:12.5px;font-weight:500;transition:all .1s;user-select:none}
.wnav:hover{background:var(--w-nav-h);color:var(--w-tx)}
.wnav.active{background:var(--w-nav-a);border-left-color:var(--w-nav-ab);color:var(--w-nav-at)}
.wnav svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.wnav.active svg{opacity:1}
.waf-main{flex:1;min-width:0;display:flex;flex-direction:column}
.waf-toolbar{height:46px;flex:0 0 46px;background:var(--w-sur);border-bottom:1px solid var(--w-bdr);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.wtl{display:flex;align-items:baseline;gap:6px}
.wt-title{font-size:13.5px;font-weight:700;color:var(--w-tx)}
.wt-desc{font-size:11px;color:var(--w-tx3)}
.wstatus{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--w-tx3)}
.wdot{width:7px;height:7px;border-radius:50%;background:var(--w-acc);flex-shrink:0}
.waf-content{flex:1;min-height:0;padding:11px;overflow:hidden;display:flex;flex-direction:column}
.wscroll{flex:1;overflow-y:auto;overflow-x:hidden}
.wscroll::-webkit-scrollbar{width:3px}
.wscroll::-webkit-scrollbar-thumb{background:var(--w-bdr2);border-radius:2px}
.waf-footer{flex:0 0 36px;border-top:1px solid var(--w-bdr);background:var(--w-sur);padding:0 14px;display:flex;align-items:center;justify-content:space-between}
.wfl{display:flex;align-items:center;gap:14px}
.wf-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--w-tx3);text-decoration:none;transition:color .12s}
.wf-link:hover{color:var(--w-acc)}
.wf-link svg{width:13px;height:13px}
.wf-ver{font-size:11px;color:var(--w-tx3)}
.wgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:10px}
.wcard{background:var(--w-sur);border:1px solid var(--w-bdr);border-radius:8px;padding:13px 14px;transition:border-color .12s}
.wcard:hover{border-color:var(--w-bdr2)}
.wc-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;flex-shrink:0}
.wc-icon svg{width:16px;height:16px}
.ic-bl{background:var(--ic-bl-bg);color:var(--ic-bl-c)}
.ic-am{background:var(--ic-am-bg);color:var(--ic-am-c)}
.ic-re{background:var(--ic-re-bg);color:var(--ic-re-c)}
.ic-gr{background:var(--ic-gr-bg);color:var(--ic-gr-c)}
.wc-icon svg{stroke:currentColor}
.wc-label{font-size:10.5px;color:var(--w-tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.wc-val{font-size:26px;font-weight:700;color:var(--w-tx);margin-top:3px;letter-spacing:-.5px;line-height:1}
.wc-hint{font-size:11px;color:var(--w-tx3);margin-top:4px}
.wpanel{background:var(--w-sur);border:1px solid var(--w-bdr);border-radius:8px;overflow:hidden}
.wpanel+.wpanel{margin-top:9px}
.wph{height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--w-bdr);background:var(--w-sur);gap:8px;flex-shrink:0}
.wph-l{display:flex;align-items:center;gap:8px}
.wph-r{display:flex;align-items:center;gap:6px}
.wpt{font-size:12.5px;font-weight:700;color:var(--w-tx);display:flex;align-items:center;gap:6px}
.wpt svg{width:14px;height:14px;stroke:var(--w-tx3)}
.wsearch{height:26px;padding:0 8px;border:1px solid var(--w-bdr);border-radius:5px;background:var(--w-sur2);color:var(--w-tx);font-size:11.5px;outline:none;width:155px;transition:border-color .12s}
.wsearch::placeholder{color:var(--w-tx3)}

.wsel{height:26px;padding:0 6px;border:1px solid var(--w-bdr);border-radius:5px;background:var(--w-sur2);color:var(--w-tx2);font-size:11.5px;outline:none;cursor:pointer}
.wsel:focus{border-color:var(--w-acc)}
.wtable-wrap{overflow-x:auto}
.wtable{width:100%;border-collapse:collapse;table-layout:fixed}
.wtable th{position:sticky;top:0;background:var(--w-th);color:var(--w-tx3);font-size:10.5px;font-weight:700;text-align:left;padding:8px 10px;border-bottom:1px solid var(--w-bdr);z-index:1;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.wtable td{padding:9px 10px;border-bottom:1px solid var(--w-bdr);vertical-align:middle;font-size:12px;color:var(--w-tx);word-break:break-word}
.wtable tr:last-child td{border-bottom:0}
.wtable tr:hover td{background:var(--w-trh)}
.wbadge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600;line-height:16px;white-space:nowrap}
.wlow{background:var(--bl-bg);color:var(--bl-tx)}
.wmedium{background:var(--am-bg);color:var(--am-tx)}
.whigh{background:var(--hi-bg);color:var(--hi-tx)}
.wcritical{background:var(--cr-bg);color:var(--cr-tx)}
.wok{background:var(--ok-bg);color:var(--ok-tx)}
.wmuted{color:var(--w-tx3);font-size:11px;margin-top:2px;line-height:1.3}
.wcode{font-family:Menlo,Consolas,monospace;background:var(--w-code);border:1px solid var(--w-cbdr);border-radius:4px;padding:4px 7px;word-break:break-all;max-height:52px;overflow:auto;font-size:11px;color:var(--w-tx2)}
.wempty{padding:42px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--w-tx3)}
.wempty svg{width:28px;height:28px;stroke:var(--w-tx3);opacity:.35}
.wempty span{font-size:12px}
.wjson{min-height:400px;white-space:pre-wrap;background:var(--w-json);color:var(--w-json-tx);padding:12px;border-radius:7px;font-family:Menlo,Consolas,monospace;font-size:11.5px;line-height:1.6;overflow:auto}
.wform{padding:12px 14px;display:grid;grid-template-columns:180px 1fr;gap:11px 14px;align-items:start}
.wfl-lbl{color:var(--w-tx2);font-weight:600;font-size:12px;padding-top:2px}
.wfv{color:var(--w-tx);font-size:12px;padding-top:2px}
.wrisk{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.wpager{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--w-bdr);background:var(--w-sur);flex-shrink:0}
.wpager-info{font-size:11px;color:var(--w-tx3)}
.wpager-btns{display:flex;align-items:center;gap:3px}
.wpb{min-width:26px;height:26px;padding:0 4px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--w-bdr);border-radius:5px;background:var(--w-sur2);color:var(--w-tx2);cursor:pointer;font-size:11.5px;font-weight:500;transition:all .1s;line-height:1}
.wpb:hover:not([disabled]){background:var(--w-nav-h);border-color:var(--w-bdr2);color:var(--w-tx)}
.wpb.cur{background:var(--w-acc);border-color:var(--w-acc);color:#fff;cursor:default}
.wpb[disabled]{opacity:.3;cursor:not-allowed}
.wpb svg{width:13px;height:13px;stroke:currentColor}
.wsort{cursor:pointer;user-select:none}
.wsort:hover{color:var(--w-tx)}
.wsort.asc::after{content:' ↑';font-size:9px;opacity:.7}
.wsort.desc::after{content:' ↓';font-size:9px;opacity:.7}
.wdiv{width:1px;height:16px;background:var(--w-bdr);margin:0 2px}
</style>

<script>
var S={tab:'overview',raw:null};
var PG={
  events:{page:1,perPage:20,search:'',sort:'ts',dir:'desc',filter:''},
  rules:{page:1,perPage:15,search:'',sort:'name',dir:'asc',filter:''},
  bans:{page:1,perPage:15,search:'',sort:'created_at',dir:'desc',filter:''}
};
var CACHE={};
var TITLES={
  overview:['Overview','Running status and summary'],
  events:['Interception','Detected suspicious requests'],
  rules:['Rules','Detection rules and thresholds'],
  bans:['Blockade','Banned and dry-run IP records'],
  settings:['Global','Runtime configuration'],
  raw:['Logs','Operation result and JSON detail']
};

function smResizeLayer(){
  setTimeout(function(){
    var l=document.querySelector('.waf') && document.querySelector('.waf').closest('.layui-layer');
    if(l){l.style.width='1130px';l.style.height='860px';l.style.left=Math.max(20,(window.innerWidth-1130)/2)+'px';l.style.top=Math.max(20,(window.innerHeight-860)/2)+'px';}
  },100);
}

function smNotice(msg,ok){
  if(window.layer&&layer.msg)layer.msg(msg,{icon:ok?1:2,time:1600});
}
function smPost(fn,data,cb){
  document.getElementById('sm-content').innerHTML='<div style="padding:50px;text-align:center;color:var(--w-tx3);font-size:13px">Loading…</div>';
  var done=function(r){
    if(typeof r==='string'){
      try{r=JSON.parse(r);}catch(e){r={status:false,msg:r};}
    }
    S.raw=r;
    if(r&&r.status===false)smNotice(typeof r.msg==='string'?r.msg:'Request failed',false);
    if(cb)cb(r&&r.msg!==undefined?r.msg:r);
  };
  var fail=function(){S.raw={status:false,msg:'Network error'};smNotice('Network error',false);if(cb)cb(null);};
  if(window.$&&$.post){
    $.post('/plugin?action=a&name=security_monitor&s='+fn,data||{},done).fail(fail);
    return;
  }
  var p=new URLSearchParams(data||{});
  fetch('/plugin?action=a&name=security_monitor&s='+fn,{method:'POST',body:p,headers:{'Content-Type':'application/x-www-form-urlencoded'},credentials:'same-origin'})

function sortArr(arr,key,dir){
  return arr.slice().sort(function(a,b){
    var av=a[key],bv=b[key];
    if(av===undefined||av===null)av='';if(bv===undefined||bv===null)bv='';
    if(typeof av==='boolean')av=av?1:0;if(typeof bv==='boolean')bv=bv?1:0;
    if(!isNaN(Number(av))&&!isNaN(Number(bv))){av=Number(av);bv=Number(bv);}
    else{av=String(av).toLowerCase();bv=String(bv).toLowerCase();}
    return dir==='asc'?(av>bv?1:av<bv?-1:0):(av<bv?1:av>bv?-1:0);
  });
}

  var rows='';
  if(msg&&typeof msg==='object'&&!Array.isArray(msg)){
    rows=Object.keys(msg).map(function(k){return '<tr><td style="width:200px;font-weight:600;color:var(--w-tx2)">'+esc(k)+'</td><td><div class="wcode">'+esc(typeof msg[k]==='object'?JSON.stringify(msg[k],null,2):msg[k])+'</div></td></tr>';}).join('');
  }else{rows='<tr><td><div class="wcode">'+esc(JSON.stringify(msg,null,2))+'</div></td></tr>';}
  document.getElementById('sm-content').innerHTML=
    '<div class="wpanel"><div class="wph"><div class="wph-l"><div class="wpt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Operation result</div>'+(ok?'<span class="wbadge wok">Success</span>':'<span class="wbadge whigh">Failed</span>')+'</div><div class="wph-r"><button class="wb" onclick="smRawJson()" style="height:26px;font-size:11px">Raw JSON</button></div></div>'
    +'<div class="wtable-wrap"><table class="wtable"><thead><tr><th style="width:200px">Key</th><th>Value</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}
function smRawJson(){document.getElementById('sm-content').innerHTML='<div class="wjson">'+esc(JSON.stringify(S.raw||{},null,2))+'</div>';}

smResizeLayer();
smOverview();
</script>
